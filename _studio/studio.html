    audio.play().then(()=>{now.textContent='🎙 your line · '+name;}).catch(()=>{now.textContent='⚠ could not generate — check key/quota';}); }
  async function useVoice(vId,name){ try{
      const j=await(await fetch('/api/set-voice?channel='+encodeURIComponent(CH||''),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({voiceId:vId,model:model.value,stability:+stab.value,style:+style.value})})).json();
      if(j.ok){vlCur=vId;voiceId=vId;voiceModel=model.value;showToast('✓ "'+name+'" set as the channel voice — now Re-voice ALL to apply it',3400);markCur();if(activeTab==='scenes')render();}
      else showToast('⚠ '+(j.error||'could not set'),3000);
    }catch(e){showToast('⚠ '+e,3000);} }
  function markCur(){ if(!modal)return; modal.querySelectorAll('.vlcard').forEach(c=>{const cur=c.dataset.vid===vlCur;c.classList.toggle('cur',cur);const u=c.querySelector('.useb');if(u){u.classList.toggle('accent',cur);u.textContent=cur?'✓ Channel voice':'Use this voice';}}); }
  function vcard(v){
    const traits=[v.descriptive,v.gender,v.age&&String(v.age).replace('_',' '),v.accent,(v.use_case||'').replace(/_/g,' ')].filter(Boolean).join(' · ')+(v.clones?(' · '+(v.clones).toLocaleString()+' uses'):'');
    const labelTraits=v.labels?[v.labels.descriptive,v.labels.gender,(v.labels.use_case||'').replace(/_/g,' ')].filter(Boolean).join(' · '):'';
    const c=el('div',{class:'vlcard'}); c.dataset.vid=v.voice_id;
    c.append(el('div',{class:'vlname'},v.name||'(unnamed)'));
    c.append(el('div',{class:'vltraits'},(traits.trim()||labelTraits||'')));
    const b=el('div',{class:'vlbtns'});
    b.append(el('button',{class:'btn sm',onclick:()=>playSample(v.preview_url,v.name)},'▶ Sample'));
    b.append(el('button',{class:'btn sm accent',onclick:()=>playMine(v.voice_id,v.name)},'🎙 My line'));
    b.append(el('button',{class:'btn sm useb',onclick:()=>useVoice(v.voice_id,v.name)},'Use this voice'));
    c.append(b); return c;
  }
  const account=el('div',{class:'vlgrid'},el('div',{class:'vlloading'},'loading…'));
  fetch('/api/voice-list?channel='+encodeURIComponent(CH||'')).then(r=>r.json()).then(j=>{ account.innerHTML=''; vlCur=j.current||vlCur;
    if(j.error){account.append(el('div',{class:'vlloading'},j.error));return;}
    if(!(j.voices||[]).length){account.append(el('div',{class:'vlloading'},'no voices on the account'));return;}
    j.voices.forEach(v=>account.append(vcard(v))); markCur();
  }).catch(e=>{account.innerHTML='';account.append(el('div',{class:'vlloading'},'error: '+e));});
  const q=el('input',{type:'text',placeholder:'search a name or trait (e.g. James, calm, documentary)…'});
  const gender=el('select',{},el('option',{value:''},'any gender'),el('option',{value:'male',selected:'selected'},'male'),el('option',{value:'female'},'female'));
  const use=el('select',{},el('option',{value:'narrative_story',selected:'selected'},'narration'),el('option',{value:'informative_educational'},'educational'),el('option',{value:'conversational'},'conversational'),el('option',{value:''},'any use'));
  const lib=el('div',{class:'vlgrid'},el('div',{class:'vlloading'},'searching…'));
  function searchLib(){ lib.innerHTML='<div class="vlloading">searching…</div>'; const p=new URLSearchParams();
    if(q.value.trim())p.set('search',q.value.trim()); if(gender.value)p.set('gender',gender.value); if(use.value)p.set('use_case',use.value);
    fetch('/api/shared-voices?'+p.toString()).then(r=>r.json()).then(j=>{ lib.innerHTML=''; const vs=(j.voices||[]).sort((a,b)=>(b.clones||0)-(a.clones||0));
      if(!vs.length){lib.append(el('div',{class:'vlloading'},'no matches — try a different search'));return;}
      vs.forEach(v=>lib.append(vcard(v))); markCur();
    }).catch(e=>{lib.innerHTML='';lib.append(el('div',{class:'vlloading'},'error: '+e));}); }
  q.addEventListener('keydown',e=>{if(e.key==='Enter')searchLib();}); searchLib();
  const presets=el('div',{class:'vlpresets'});
  [['Hook (open ocean)','Sixty-five thousand years ago, someone pushed off from a beach, paddled past the last island they could see, and kept going — straight out into open ocean.'],
   ['Debunk (Zed)','And the skeptics pounced — for good reason. So a separate team went back and tested it a completely different way. Same answer.'],
   ['Payoff','We didn’t adapt to the world. We carried our world with us. That’s the whole trick.']].forEach(([lbl,txt])=>presets.append(el('button',{onclick:()=>{line.value=txt;}},lbl)));
  const close=()=>{const b=document.querySelector('.vlback');if(b)b.remove();};
  const modal=el('div',{class:'vlmodal'});
  modal.append(
    el('div',{class:'vlhead'}, el('h2',{},'🎙 Voice Lab'), el('button',{class:'iconbtn',title:'Close',onclick:close},'✕')),
    el('div',{class:'vlbody'},
      el('div',{class:'vlsec'}, el('h3',{},'Test line'),
        el('p',{class:'thumbwhy',style:'margin:.1em 0 .5em'},'Type a line, set expressiveness, then ▶ Sample (the voice’s official demo) or 🎙 My line (reads your text). A little style (~0.3–0.4) adds natural inflection without going theatrical.'),
        line, presets,
        el('div',{class:'vlctrls'},
          el('div',{class:'vlctrl'}, el('label',{},'Model'), model),
          el('div',{class:'vlctrl'}, el('label',{},'Stability ',stabV), stab),
          el('div',{class:'vlctrl'}, el('label',{},'Expressiveness ',styleV), style))),
      el('div',{class:'vlplayer'}, now, audio),
      el('div',{class:'vlsec'}, el('h3',{},'Your account voices'), account),
      el('div',{class:'vlsec'}, el('h3',{},'Browse the ElevenLabs library'),
        el('div',{class:'vllib'}, q, gender, use, el('button',{class:'btn sm accent',onclick:searchLib},'Search')),
        lib))
  );
  const back=el('div',{class:'vlback',onclick:e=>{if(e.target===back)close();}}, modal);
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',esc);}});
  document.body.append(back);
}
/* ---------- auto-assembler (Remotion rough cut) ---------- */
let asm={installed:false,running:false,status:{},hasOutput:false}, asmPollTimer=null;
async function checkAssemble(){
  try{ asm=await (await fetch('/api/assemble-status?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID))).json();
    if(activeTab==='scenes')render(); if(asm.running)startAsmPoll();
  }catch(_){}
}
function videoFileUrl(which,t){return '/api/video-file?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID)+'&which='+which+(t?'&t='+encodeURIComponent(t):'');}
async function startAssemble(opts){
  opts=opts||{}; const isSample=!!(opts.from||opts.to);
  showToast('🎬 Starting '+(isSample?'sample':'full')+' render…');
  try{ const j=await (await fetch('/api/assemble?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(opts)})).json();
    if(j.needsSetup||j.isError){showToast('⚠ '+(j.error||'could not start'),6000);return;}
    asm.running=true; if(activeTab==='scenes')render(); startAsmPoll();
  }catch(e){showToast('⚠ '+e,4000);}
}
function startAsmPoll(){ stopAsmPoll(); asmPollTimer=setInterval(async()=>{
  try{ const j=await (await fetch('/api/assemble-status?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID))).json();
    const was=asm.running; asm=j; if(activeTab==='scenes')render();
    if(was&&!asm.running){ stopAsmPoll(); const st=asm.status||{};
      showToast(st.state==='error'?('⚠ Render failed: '+(st.message||'see 05-edit/render.log')):'✓ Rough cut ready → 05-edit/rough-cut.mp4',8000); }
  }catch(_){}
},3000); }
function stopAsmPoll(){ if(asmPollTimer){clearInterval(asmPollTimer);asmPollTimer=null;} }
function assembleToolbar(scenes){
  const bar=el('div',{class:'imgbar'});
  bar.append(el('b',{},'🎬 Assemble rough cut'));
  const imgs=scenes.filter(s=>s.imagePath).length;
  const voiced=scenes.filter(s=>s.audioPath).length;
  const withNarr=scenes.filter(s=>(s.narration||'').trim()).length;
  if(!asm.installed){
    bar.append(el('div',{class:'est'},'One-time setup: install the renderer, then re-check.'));
    bar.append(el('div',{style:'margin-top:6px'},el('span',{class:'cmd'},'cd _studio/render && npm install')));
    bar.append(el('div',{style:'margin-top:8px'},el('button',{class:'btn sm',onclick:checkAssemble},'↻ Re-check')));
    return bar;
  }
  bar.append(el('div',{class:'est'},imgs+'/'+scenes.length+' images · '+voiced+'/'+withNarr+' beats voiced. Builds a rough cut from whatever is rendered — Ken Burns + reveal frames + captions'+(voiced?' + narration (auto-timed)':' (silent until you generate narration)')+'.'));
  if(asm.running){
    const st=asm.status||{}, p=st.progress||0;
    bar.append(el('div',{class:'est'},'⏳ '+(st.mode?st.mode+' · ':'')+(st.state||'working')+(st.state==='rendering'?' — '+p+'%':'…')));
    const b=el('div',{class:'progbar'});b.append(el('i',{style:'width:'+p+'%'}));bar.append(b);
    return bar;
  }
  const row=el('div',{class:'row'});
  row.append(el('button',{class:'btn',onclick:()=>startAssemble({from:1,to:6}),title:'Render just the first ~6 beats to audit motion/captions/timing fast'},'🎬 Sample (hook, ~6 beats)'));
  row.append(el('button',{class:'btn accent',onclick:()=>startAssemble()},asm.hasFull?'🔄 Re-assemble full':'🎬 Assemble full'));
  bar.append(row);
  if(asm.hasFull||asm.hasSample){
    const dl=el('div',{class:'row',style:'margin-top:6px'});
    if(asm.hasFull)dl.append(el('a',{class:'btn sm',href:videoFileUrl('full'),target:'_blank',download:'rough-cut.mp4'},'⬇ Full MP4'));
    if(asm.hasSample)dl.append(el('a',{class:'btn sm',href:videoFileUrl('sample'),target:'_blank',download:'rough-cut-sample.mp4'},'⬇ Sample MP4'));
    bar.append(dl);
    const st=asm.status||{};
    const which=(st.mode==='sample'&&asm.hasSample)?'sample':(asm.hasFull?'full':'sample');
    bar.append(el('div',{class:'est',style:'margin-top:6px'},'Showing the '+which+' cut'+(st.beats?' · '+st.beats+' beats':'')+(st.durationSec?' · ~'+fmtSec(st.durationSec):'')+(st.skipped?' · '+st.skipped+' skipped (no image/audio yet)':'')));
    bar.append(el('video',{class:'roughvid',controls:'controls',preload:'metadata',src:videoFileUrl(which,st.updatedAt)}));
  }
  return bar;
}
function imageToolbar(scenes){
  const bar=el('div',{class:'imgbar'});
  const made=scenes.filter(s=>s.imagePath).length;
  if(!hasGeminiKey){
    bar.append(el('b',{},'Auto-generate the images with Gemini'));
    bar.append(el('div',{class:'est'},'Paste your Google AI Studio key (aistudio.google.com/apikey) to generate every image in one click. Stored locally only.'));
    const inp=el('input',{type:'password',placeholder:'Gemini API key…'});
    bar.append(el('div',{class:'keyrow'},inp,el('button',{class:'btn',onclick:()=>saveKey(inp.value)},'Save key')));
    return bar;
  }
  const progBar=()=>{const b=el('div',{class:'progbar'});b.append(el('i',{style:'width:'+Math.round((made/Math.max(1,scenes.length))*100)+'%'}));return b;};
  if(imagesGenerating){
    bar.append(el('b',{},'🖼️ Generating with Gemini…'));
    bar.append(el('div',{class:'est'},made+' / '+scenes.length+' images done — leave this open; shots fill in below as they finish.'));
    bar.append(progBar());
    return bar;
  }
  bar.append(el('div',{class:'est'},'Gemini images: '+made+' / '+scenes.length+' rendered'+(made<scenes.length?(' · remaining run ≈ $'+((scenes.length-made)*0.039).toFixed(2)+' (~$0.039/image)'):' · complete ✓')+'.'));
  if(made)bar.append(progBar());
  const row=el('div',{class:'row'});
  row.append(el('button',{class:'btn',onclick:lockCast},'🎭 Lock the cast'));
  const complete=made>=scenes.length;
  const genAll=el('button',{class:'btn accent',onclick:()=>genImages(false)},complete?'✓ All rendered':(made?'🖼️ Generate '+(scenes.length-made)+' missing':'🖼️ Generate all images'));
  if(complete)genAll.disabled=true;
  row.append(genAll);
  row.append(el('button',{class:'btn',onclick:()=>genImages(true)},made?'Re-render scene 1':'Test scene 1'));
  bar.append(row);
  bar.append(el('div',{class:'est',style:'margin-top:6px'},'Lock the cast once (per-character refs), then Generate. The full run skips images you already have — to redo one shot, use its 🔄 button below.'));
  bar.append(castAdaptBlock());
  return bar;
}
/* ---------- MUSIC BED BROWSER (audition only — nothing is rendered) ---------- */
let musicLib=null, musicOpen=false, musicLoading=false;
function musicToolbar(){
  const bar=el('div',{class:'imgbar'});
  const head=el('div',{class:'row',style:'margin-top:0'});
  head.append(el('b',{style:'flex:1'},'🎵 Music bed — browse & audition'));
  head.append(el('button',{class:'btn sm',onclick:()=>{musicOpen=!musicOpen;if(musicOpen&&!musicLib)loadMusicLib();else render();}},musicOpen?'Hide':'Browse beds'));
  bar.append(head);
  bar.append(el('div',{class:'est'},'Listen to candidate tracks — just the audio, nothing renders. “Use as channel bed” swaps the track the assembler ducks under the narration; re-assemble afterward to hear it in the cut. All tracks are CC-BY (the credit line travels into the description automatically).'));
  if(!musicOpen)return bar;
  if(musicLoading||!musicLib){bar.append(el('div',{class:'est',style:'margin-top:8px'},'Loading tracks…'));return bar;}
  const tracks=musicLib.tracks||[];
  if(!tracks.length){bar.append(el('div',{class:'est',style:'margin-top:8px'},'No tracks in History/_assets/music/_auditions/. Drop .mp3 files there (and optionally add them to library.json) to audition them.'));return bar;}
  const wrap=el('div',{class:'musicgrid'});
  wrap.addEventListener('play',(e)=>{wrap.querySelectorAll('audio').forEach(a=>{if(a!==e.target)a.pause();});},true); // one-at-a-time
  tracks.forEach(t=>{
    const card=el('div',{class:'musiccard'+(t.isBed?' isbed':'')});
    const top=el('div',{class:'row',style:'margin-top:0;justify-content:space-between'});
    top.append(el('div',{class:'mtitle'},t.title));
    top.append(el('span',{class:'mbadge'+(t.isBed?' cur':'')},t.isBed?'● current bed':(t.license||'CC-BY')));
    card.append(top);
    const sub=[t.composer,...(t.mood||[])].filter(Boolean).join(' · ');
    if(sub)card.append(el('div',{class:'mmood'},sub));
    if(t.note)card.append(el('div',{class:'mnote'},t.note));
    const au=el('audio',{controls:'controls',preload:'none'});
    au.src='/api/music-file?channel='+encodeURIComponent(CH)+'&name='+encodeURIComponent(t.file);
    card.append(au);
    const actions=el('div',{class:'row'});
    if(!t.isBed)actions.append(el('button',{class:'btn sm',onclick:()=>setBed(t)},'✓ Use as channel bed'));
    card.append(actions);
    if(t.attribution)card.append(el('div',{class:'mcredit'},'Credit: '+t.attribution));
    wrap.append(card);
  });
  bar.append(wrap);
  return bar;
}
async function loadMusicLib(){
  musicLoading=true;render();
  try{musicLib=await(await fetch('/api/music-library?channel='+encodeURIComponent(CH))).json();}
  catch(_){musicLib={tracks:[]};}
  musicLoading=false;render();
}
async function setBed(t){
  if(!confirm('Set “'+t.title+'” as the channel music bed?\n\nThis only swaps the bed file — nothing renders now. Re-assemble the video to hear it.'))return;
  try{
    const j=await(await fetch('/api/set-bed?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID)+'&name='+encodeURIComponent(t.file),{method:'POST'})).json();
    if(j&&j.ok){showToast('✓ “'+t.title+'” is now the channel bed — re-assemble to hear it',3400);musicLib=null;loadMusicLib();}
    else showToast('Couldn’t set bed: '+((j&&j.error)||'unknown error'),3200);
  }catch(e){showToast('Set-bed failed: '+e.message,3200);}
}
function copyText(t,label){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>showToast('Copied '+(label||'')+' ✓',1600),()=>fallbackCopy(t,label));
  }else fallbackCopy(t,label);
}
function fallbackCopy(t,label){
  const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.append(ta);ta.select();
  try{document.execCommand('copy');showToast('Copied '+(label||'')+' ✓',1600);}catch(_){showToast('Copy failed — select it manually',2600);}
  ta.remove();
}

boot();
</script>
