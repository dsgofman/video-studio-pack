<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🎬 Video Studio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='6' y='14' width='88' height='72' rx='14' fill='%23e58146'/%3E%3Cpath d='M8 36h84M30 15 22 36M55 15 47 36M80 15 72 36' stroke='%231a0f05' stroke-width='7' fill='none' stroke-linecap='round'/%3E%3Cpath d='m44 50 22 12-22 12z' fill='%231a0f05'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  /* ============ DESIGN TOKENS ============ */
  :root{
    color-scheme:dark;
    /* Warm-charcoal (brown-black) base — lamplit, not clinical */
    --bg:#17120d; --panel:#211a13; --panel-2:#281f17; --panel-3:#31261c;
    --field:#241c14; --line:#3a2e22; --line-2:#4d3d2d;
    --ink:#f3ece0; --muted:#bcae98; --faint:#897c69;
    /* Ink-stamp flame accent */
    --accent:#e58146; --accent-2:#f49d5e; --accent-ink:#1a0f05; --accent-soft:rgba(229,129,70,.16); --accent-line:rgba(229,129,70,.46);
    /* Natural-dye supportive hues */
    --info:#74a8cd; --info-soft:rgba(116,168,205,.15);
    --ok:#7bb069; --ok-soft:rgba(123,176,105,.15);
    --warn:#e0b14a; --warn-soft:rgba(224,177,74,.15);
    --danger:#df7058; --danger-soft:rgba(223,112,88,.15);
    --card:var(--panel);
    --radius:13px; --radius-sm:9px; --radius-lg:18px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.45);
    --shadow:0 2px 8px rgba(0,0,0,.3),0 18px 44px -22px rgba(0,0,0,.66);
    --shadow-lg:0 32px 80px -30px rgba(0,0,0,.8);
    --ring:0 0 0 3px var(--accent-soft);
    --t:.16s cubic-bezier(.4,0,.2,1);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  [data-theme="light"]{
    color-scheme:light;
    /* Sun-bleached parchment / dried-clay */
    --bg:#efe6d6; --panel:#fcf8f0; --panel-2:#f6efe1; --panel-3:#efe5d3;
    --field:#fdfaf4; --line:#e2d6c1; --line-2:#cfbfa3;
    --ink:#2a2015; --muted:#6b5d4b; --faint:#998a73;
    --accent:#c4631f; --accent-2:#d97432; --accent-ink:#fff8f0; --accent-soft:rgba(196,99,31,.13); --accent-line:rgba(196,99,31,.5);
    --info:#2f6f9e; --info-soft:rgba(47,111,158,.11);
    --ok:#4d7a3a; --ok-soft:rgba(77,122,58,.13);
    --warn:#8f6411; --warn-soft:rgba(143,100,17,.14);
    --danger:#bd4630; --danger-soft:rgba(189,70,48,.11);
    --shadow-sm:0 1px 2px rgba(86,58,22,.07);
    --shadow:0 1px 2px rgba(86,58,22,.06),0 14px 32px -16px rgba(86,58,22,.22);
    --shadow-lg:0 26px 64px -26px rgba(86,58,22,.32);
  }
  /* ============ BASE ============ */
  *{box-sizing:border-box}
  ::selection{background:var(--accent-soft)}
  *::-webkit-scrollbar{width:12px;height:12px}
  *::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px;border:3px solid transparent;background-clip:content-box}
  *::-webkit-scrollbar-thumb:hover{background:var(--faint);background-clip:content-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Archivo",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    background-image:
      radial-gradient(1100px 560px at 80% -8%,var(--accent-soft),transparent 60%),
      radial-gradient(900px 520px at -5% 0%,var(--info-soft),transparent 55%),
      radial-gradient(circle at 18% 32%,rgba(255,247,235,.018) 0,transparent .7px),
      radial-gradient(circle at 64% 71%,rgba(255,247,235,.015) 0,transparent .7px);
    background-size:auto,auto,7px 7px,11px 11px;
    background-attachment:fixed}
  /* warm laid-paper grain stays subtler in light mode so parchment reads clean */
  [data-theme="light"] body{background-image:
      radial-gradient(1100px 560px at 80% -8%,var(--accent-soft),transparent 60%),
      radial-gradient(900px 520px at -5% 0%,var(--info-soft),transparent 55%),
      radial-gradient(circle at 18% 32%,rgba(120,80,30,.03) 0,transparent .7px),
      radial-gradient(circle at 64% 71%,rgba(120,80,30,.025) 0,transparent .7px);
    background-size:auto,auto,7px 7px,11px 11px;background-attachment:fixed}
  select,button,input,textarea{font:inherit;color:inherit}
  button{cursor:pointer}
  a{color:var(--accent);text-decoration:none}
  :focus-visible{outline:none;box-shadow:var(--ring);border-radius:7px}
  /* ============ TOPBAR ============ */
  .topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(14px) saturate(1.4);
    border-bottom:1px solid var(--line);padding:11px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brandmark{display:flex;align-items:center;gap:10px;user-select:none}
  .brandmark .logo{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;color:var(--accent-ink);
    background:linear-gradient(150deg,var(--accent-2),var(--accent));box-shadow:0 4px 14px -4px var(--accent-line),inset 0 1px 0 rgba(255,255,255,.28)}
  .brandmark .wordmark{font-weight:800;letter-spacing:-.02em;font-size:17px}
  .brandmark .wordmark small{font-weight:600;color:var(--muted);margin-left:8px;font-size:12px;letter-spacing:0}
  .switcher{display:flex;align-items:center;gap:7px;background:var(--field);border:1px solid var(--line);border-radius:10px;padding:0 9px 0 11px;color:var(--muted);transition:border-color var(--t)}
  .switcher:hover{border-color:var(--line-2)}
  .switcher:focus-within{border-color:var(--accent-line);box-shadow:var(--ring)}
  .switcher select{appearance:none;-webkit-appearance:none;background:none;border:none;color:var(--ink);font-weight:600;font-size:13.5px;padding:8px 2px;max-width:44vw;cursor:pointer}
  .switcher .chev{pointer-events:none;color:var(--faint);flex:0 0 auto}
  .iconbtn{display:grid;place-items:center;width:34px;height:34px;border:1px solid var(--line);background:var(--field);border-radius:9px;color:var(--muted);transition:all var(--t);flex:0 0 auto}
  .iconbtn:hover{color:var(--ink);border-color:var(--line-2);background:var(--panel-2)}
  .iconbtn:active{transform:translateY(1px)}
  .spacer{flex:1}
  .metastrip{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .mchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--muted);background:var(--field);border:1px solid var(--line);padding:4px 9px;border-radius:999px;white-space:nowrap}
  @media(max-width:900px){.metastrip{display:none}}
  .savechip{font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--field);color:var(--faint);display:flex;align-items:center;gap:6px;transition:all var(--t);min-width:82px;justify-content:center}
  .savechip.saving{color:var(--info);border-color:var(--info-soft);background:var(--info-soft)}
  .savechip.saved{color:var(--ok);border-color:var(--ok-soft);background:var(--ok-soft)}
  /* ============ STEPPER ============ */
  .stepper{display:flex;align-items:center;gap:0;padding:16px 22px 6px;max-width:1240px;margin:0 auto;overflow-x:auto}
  .step{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:11px;cursor:pointer;color:var(--muted);font-weight:700;font-size:13.5px;white-space:nowrap;transition:all var(--t);flex:0 0 auto}
  .step:hover{color:var(--ink);background:var(--panel-2)}
  .step.active{color:var(--ink);background:var(--panel);box-shadow:var(--shadow-sm)}
  .stepnode{display:grid;place-items:center;width:25px;height:25px;border-radius:50%;font-size:12.5px;font-weight:800;position:relative;
    background:var(--field);border:1.5px solid var(--line-2);color:var(--muted);transition:all var(--t)}
  .step.active .stepnode{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .step.done .stepnode,.step.s-decided .stepnode{background:var(--ok);border-color:var(--ok);color:#fff}
  .step.s-awaiting:not(.active) .stepnode{border-color:var(--accent);color:var(--accent)}
  .step.s-locked{opacity:.55}
  .step.s-locked .stepnode{border-style:dashed}
  .stepnode .pulse{position:absolute;inset:-1.5px;border-radius:50%;border:1.5px solid var(--accent);animation:pulse 1.9s ease-out infinite;pointer-events:none}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.55);opacity:0}100%{opacity:0}}
  .steprail{flex:1 1 16px;min-width:12px;height:2px;border-radius:2px;background:var(--line);margin:0 2px}
  .steprail.fill{background:linear-gradient(90deg,var(--ok),var(--accent))}
  /* ============ LAYOUT ============ */
  main{max-width:1180px;margin:0 auto;padding:20px 22px 96px}
  .panel{display:none} .panel.active{display:block;animation:fadeUp .3s cubic-bezier(.4,0,.2,1)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  h2.stage{font-size:24px;font-weight:800;letter-spacing:-.025em;margin:.1em 0 .15em}
  .sub{color:var(--muted);margin:0 0 18px;max-width:72ch;font-size:14.5px}
  .cols{display:grid;grid-template-columns:1.05fr 1fr;gap:26px}
  @media(max-width:880px){.cols{grid-template-columns:1fr}}
  .colhead{font-size:11.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:0 0 11px}
  /* ============ BUTTONS ============ */
  .btn{border:1px solid var(--line);background:var(--field);color:var(--ink);border-radius:var(--radius-sm);padding:8px 14px;font-weight:700;font-size:13.5px;transition:all var(--t);display:inline-flex;align-items:center;gap:7px;line-height:1.1}
  .btn:hover{border-color:var(--line-2);background:var(--panel-2);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.45;cursor:default;transform:none}
  .btn.accent{background:linear-gradient(160deg,var(--accent-2),var(--accent));border-color:transparent;color:var(--accent-ink);box-shadow:0 4px 14px -5px var(--accent-line),inset 0 1px 0 rgba(255,255,255,.22)}
  .btn.accent:hover{filter:brightness(1.06);box-shadow:0 9px 22px -7px var(--accent-line),inset 0 1px 0 rgba(255,255,255,.22)}
  .btn.danger{color:var(--danger);border-color:var(--danger-soft);background:var(--danger-soft)}
  .btn.danger:hover{background:var(--danger);border-color:var(--danger);color:#fff}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .btn.big{padding:11px 20px;font-size:15px}
  .x{color:var(--faint);border:none;background:none;font-size:15px;padding:0 3px;border-radius:6px;transition:color var(--t)}
  .x:hover{color:var(--danger)}
  /* ============ TITLE ROWS ============ */
  .titlerow{display:flex;align-items:flex-start;gap:11px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow-sm);transition:border-color var(--t)}
  .titlerow:hover{border-color:var(--line-2)}
  .titlerow.primary{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 10px 26px -14px var(--accent-line)}
  .titlerow .pick{display:flex;flex-direction:column;gap:7px;align-items:center;padding-top:2px}
  .titlerow .body{flex:1;min-width:0}
  .titlerow .ttext{font-weight:700;font-size:15px}
  .titlerow .why{font-size:12.5px;color:var(--muted);margin-top:3px}
  .titlerow .charcount{font-size:11px;color:var(--faint);margin-top:4px;font-weight:600}
  .titlerow .charcount.bad{color:var(--warn)}
  .miniab{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;font-weight:700}
  .note{width:100%;margin-top:8px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12.5px;background:var(--field);transition:border-color var(--t)}
  .note:focus{outline:none;border-color:var(--accent-line);box-shadow:var(--ring)}
  .addrow{display:flex;gap:8px;margin-top:8px}
  .addrow input{flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 11px;background:var(--field)}
  .addrow input:focus{outline:none;border-color:var(--accent-line);box-shadow:var(--ring)}
  /* ============ QC ROWS / FINAL THUMBS / MAP CHIP ============ */
  .qcrow{display:flex;gap:10px;align-items:baseline;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin:5px 0;background:var(--panel);font-size:13.5px}
  .qcrow.fail{border-color:var(--danger-soft);background:var(--danger-soft)}
  .qcrow.warn{border-color:var(--warn-soft);background:var(--warn-soft)}
  .qcrow .qcic{flex:0 0 auto}
  .qcrow .qcid{flex:0 0 auto;font-size:11px;letter-spacing:.4px;color:var(--faint);text-transform:uppercase;font-weight:700;font-family:var(--mono)}
  .qcrow .qcdet{flex:1;min-width:0;color:var(--muted)}
  .finalthumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:10px}
  .finalthumbs .ft{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow-sm)}
  .finalthumbs .ft img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
  .ovwrap{position:relative;display:block;line-height:0}
  .ovwrap .ovtext{position:absolute;inset:0;pointer-events:none}
  .ovwrap .ovtext svg{width:100%;height:100%;display:block}
  .finalthumbs .ft .cap{padding:7px 10px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .mapchip{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--info-soft);background:var(--info-soft);color:var(--info);font-weight:700}
  /* ============ THUMBNAILS ============ */
  .thumbcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);padding:14px;margin-bottom:16px;box-shadow:var(--shadow);transition:border-color var(--t)}
  .thumbcard:hover{border-color:var(--line-2)}
  .thumbcard.chosen{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 14px 36px -18px var(--accent-line)}
  .frame169{width:100%;aspect-ratio:16/9;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:#11131a}
  .frame169 svg{display:block;width:100%;height:100%}
  .thumbmeta{display:flex;align-items:center;gap:12px;margin-top:12px}
  .mobile{width:120px;height:68px;border:1px solid var(--line);border-radius:7px;overflow:hidden;flex:0 0 auto;background:#11131a}
  .mobile svg{display:block;width:100%;height:100%}
  .mobile-cap{font-size:10px;color:var(--faint);text-align:center;margin-top:4px;font-weight:600;letter-spacing:.03em}
  .thumbname{font-weight:800;font-size:15px} .thumbwhy{font-size:12.5px;color:var(--muted)}
  .forTitle{font-size:13px;font-weight:700;margin:-2px 0 12px;color:var(--accent)}
  .tempRow{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
  .tempbtn{border:1px solid var(--line);background:var(--field);border-radius:8px;padding:6px 11px;font-weight:700;font-size:12px;color:var(--muted);transition:all var(--t)}
  .tempbtn:hover{border-color:var(--line-2);color:var(--ink)}
  .tempbtn.warm.on{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
  .tempbtn.cold.on{background:var(--info-soft);border-color:var(--info);color:var(--info)}
  /* ============ VOICE LAB MODAL ============ */
  .vlback{position:fixed;inset:0;z-index:80;background:rgba(6,7,10,.66);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding:26px 16px;overflow:auto}
  .vlmodal{width:min(960px,100%);background:var(--panel);border:1px solid var(--line-2);border-radius:18px;box-shadow:0 30px 80px -28px #000;overflow:hidden}
  .vlhead{display:flex;align-items:center;gap:12px;padding:15px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:3}
  .vlhead h2{margin:0;font-size:17px;font-weight:800;flex:1;letter-spacing:-.01em}
  .vlbody{padding:18px 20px;display:flex;flex-direction:column;gap:15px}
  .vlsec{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .vlsec h3{margin:0 0 6px;font-size:13px;font-weight:800;letter-spacing:.02em}
  .vlsec textarea{width:100%;min-height:58px;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;font-size:13.5px;background:var(--field);color:var(--ink);resize:vertical}
  .vlmodal select{padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--field);color:var(--ink);font:inherit}
  .vlpresets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .vlpresets button{border:1px solid var(--line);background:var(--field);border-radius:999px;padding:5px 11px;font-size:12px;cursor:pointer;color:var(--muted)}
  .vlpresets button:hover{color:var(--ink);border-color:var(--line-2)}
  .vlctrls{display:flex;gap:22px;flex-wrap:wrap;align-items:center;margin-top:12px}
  .vlctrl{display:flex;flex-direction:column;gap:4px;min-width:168px}
  .vlctrl label{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .vlctrl .v{color:var(--accent);font-weight:700}
  .vlctrl input[type=range]{width:188px;accent-color:var(--accent)}
  .vlplayer{position:sticky;top:60px;z-index:2;display:flex;align-items:center;gap:12px;background:var(--panel-3);border:1px solid var(--line);border-radius:12px;padding:9px 13px}
  .vlplayer audio{flex:1;height:36px}
  .vlnow{font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap;max-width:38%;overflow:hidden;text-overflow:ellipsis}
  .vlgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px}
  .vlcard{border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--panel)}
  .vlcard.cur{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .vlname{font-weight:800;font-size:14px}
  .vltraits{font-size:11.5px;color:var(--muted);margin:2px 0 9px;min-height:15px}
  .vlbtns{display:flex;gap:6px;flex-wrap:wrap}
  .vllib{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .vllib input[type=text]{flex:1;min-width:168px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;background:var(--field);color:var(--ink)}
  .vlloading{color:var(--muted);font-size:13px;padding:8px}
  /* ============ GATE / TOGGLE / NOTES ============ */
  .gate{margin-top:24px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm)}
  .gate h3{margin:0 0 4px;font-size:16px;font-weight:800;letter-spacing:-.01em}
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:10px;background:var(--field);padding:3px;gap:3px}
  .toggle button{border:none;background:none;padding:8px 22px;font-weight:800;color:var(--muted);border-radius:7px;transition:all var(--t)}
  .toggle button:hover{color:var(--ink)}
  .toggle button.yes.on{background:var(--ok);color:#fff} .toggle button.no.on{background:var(--danger);color:#fff}
  .bignote{width:100%;margin-top:14px;border:1px solid var(--line);border-radius:11px;padding:11px 13px;min-height:66px;font:inherit;font-size:13.5px;background:var(--field);color:var(--ink);resize:vertical;transition:border-color var(--t)}
  .bignote:focus{outline:none;border-color:var(--accent-line);box-shadow:var(--ring)}
  .locked{background:var(--panel);border:1px dashed var(--line-2);border-radius:var(--radius-lg);padding:44px 40px;text-align:center;color:var(--muted)}
  .pill{display:inline-block;background:var(--field);border:1px solid var(--line);border-radius:999px;padding:3px 11px;font-size:12px;font-weight:700;color:var(--muted)}
  ul.spine{margin:.3em 0 0;padding-left:1.1em} ul.spine li{margin:.3em 0}
  .ideabox{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px 22px;box-shadow:var(--shadow);margin-bottom:16px}
  .ideabox .lab{font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-top:14px}
  .ideabox .lab:first-child{margin-top:0}
  .ideabox .big{font-size:19px;font-weight:700;margin:3px 0 6px;letter-spacing:-.01em}

  .ideacard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow-sm);transition:border-color var(--t),box-shadow var(--t);cursor:pointer}

  /* ============ CHAT ============ */

  /* ============ REVAMP: Lamplit Field Guide — Warm-Charcoal Museum Workshop ============ */
/* ===== TOPBAR — warm pressed-paper masthead ===== */

  /* ===== SWITCHER + ICON KEYS — tactile field tools ===== */
  .switcher{display:flex;align-items:center;gap:7px;background:var(--field);border:1px solid var(--line);border-radius:10px;padding:0 9px 0 11px;color:var(--muted);box-shadow:var(--shadow-sm);transition:border-color var(--t),background var(--t)}

  .iconbtn{display:grid;place-items:center;width:34px;height:34px;border:1px solid var(--line);background:var(--field);border-radius:9px;color:var(--muted);

  /* ===== STEPPER — stitched field-map route + stone page-chips ===== */
  .stepper{display:flex;align-items:center;gap:2px;padding:18px 22px 8px;max-width:1240px;margin:0 auto;overflow-x:auto}

  /* stamped "you are here" underline */

  .step.s-locked{opacity:.55}

  /* pulse child re-rounded to match the square node (CRITICAL fix) */
  .stepnode .pulse{position:absolute;inset:-1.5px;border-radius:7px;border:1.5px solid var(--accent);animation:pulse 2s ease-out infinite;pointer-events:none}
  .steplabel{letter-spacing:-.003em}

  /* ===== STAGE HEADINGS — Fraunces museum-placard ===== */
  h2.stage{font-family:"Fraunces",Georgia,serif;font-size:27px;font-weight:600;letter-spacing:-.012em;margin:.1em 0 .15em}

  .btn{font-family:"Archivo",sans-serif;border:1px solid var(--line);background:var(--field);color:var(--ink);border-radius:var(--radius-sm);padding:8px 14px;font-weight:700;font-size:13.5px;
    box-shadow:0 2px 0 var(--line),inset 0 1px 0 color-mix(in srgb,var(--ink) 5%,transparent);

  .btn:active{transform:translateY(1px);box-shadow:0 1px 0 var(--line),inset 0 2px 4px rgba(0,0,0,.16)}

    box-shadow:0 4px 0 color-mix(in srgb,var(--accent) 58%,#000),0 8px 20px -8px var(--accent-line),inset 0 1px 0 rgba(255,255,255,.3)}
  .btn.accent:hover{filter:brightness(1.05);transform:translateY(-1px);box-shadow:0 6px 0 color-mix(in srgb,var(--accent) 58%,#000),0 13px 26px -8px var(--accent-line),inset 0 1px 0 rgba(255,255,255,.3)}
  .btn.accent:active{transform:translateY(2px);box-shadow:0 1px 0 color-mix(in srgb,var(--accent) 58%,#000),inset 0 2px 5px rgba(80,30,0,.22)}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px;box-shadow:0 1px 0 var(--line)}
  .btn.sm:active{box-shadow:inset 0 1px 3px rgba(0,0,0,.16)}

/* Page transition — keep the existing fadeUp name, warm the easing into a gentle settle */
  .panel.active{animation:fadeUp .32s cubic-bezier(.2,.7,.2,1)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* Awaiting-human pulse — ink-stamp ring that breathes (square radius matches the node) */
  @keyframes pulse{0%{transform:scale(1);opacity:.65}70%{transform:scale(1.45);opacity:0}100%{opacity:0}}

  /* Tactile lift on hero cards (additive; existing :active resets respected) */
  .titlerow,.thumbcard,.scard,.ideacard,.musiccard{transition:border-color var(--t),box-shadow var(--t),transform var(--t)}
  .titlerow:hover,.scard:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .thumbcard:hover,.ideacard:hover{transform:translateY(-2px);box-shadow:var(--shadow)}

  /* Chip / pill / toggle press feedback */
  .mchip,.pill,.demandchip,.kindchip,.tempbtn,.pacebtn{transition:all var(--t)}

  .toggle button:active{transform:scale(.96)}

  /* Save chip lands with a soft warm stamp */
  .savechip{transition:all var(--t)}
  .savechip.saved{animation:stampIn .3s cubic-bezier(.2,.7,.2,1)}
  @keyframes stampIn{0%{transform:scale(.92);opacity:.6}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}

  /* Chat FAB — gentle hover float, brand-consistent */
  .chatbtn{transition:transform var(--t),box-shadow var(--t),filter var(--t)}
  .chatbtn:hover{transform:translateY(-2px);filter:brightness(1.04)}

  /* Accent button sheen sweep on hover (GPU-cheap, content-free) */
  .btn.accent{position:relative;overflow:hidden}
  .btn.accent::after{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 32%,rgba(255,255,255,.16) 50%,transparent 68%);
    transform:translateX(-120%);transition:transform .6s cubic-bezier(.2,.7,.2,1);pointer-events:none}
  .btn.accent:hover::after{transform:translateX(120%)}

  @media(prefers-reduced-motion:reduce){
    .panel.active,.stepnode .pulse,.savechip.saved{animation:none}
    .titlerow:hover,.scard:hover,.thumbcard:hover,.ideacard:hover,.chatbtn:hover{transform:none}
    .btn.accent::after{display:none}
  }

/* ===== IDEA CARD — tactile field-notebook leaf with a spine that inks on hover/select ===== */
  .ideacard{position:relative;overflow:hidden}
  .ideacard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
    background:linear-gradient(var(--line-2),var(--line));opacity:.85;transition:background var(--t),opacity var(--t)}
  .ideacard:hover::before{opacity:1}
  .ideacard.chosen{box-shadow:0 0 0 1px var(--accent),0 16px 40px -20px var(--accent-line)}
  .ideacard.chosen::before{background:linear-gradient(var(--accent-2),var(--accent));opacity:1}
  .ideastatement{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:19px;line-height:1.3;letter-spacing:-.008em}
  .demandchip{font-family:"Archivo",sans-serif}

  /* ===== GATE — warm decision panel ===== */
  .gate h3{font-family:"Fraunces",Georgia,serif;font-weight:600;letter-spacing:-.008em}
  .toggle button.yes.on{background:var(--ok);color:#fff}
  .toggle button.no.on{background:var(--danger);color:#fff}

  /* ===== TITLE ROW — hairline framing instead of flat swap; Fraunces title text ===== */

  .titlerow.primary{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 12px 28px -16px var(--accent-line)}

  /* ===== THUMB / FINAL-THUMB names in display face ===== */
  .thumbname{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:15.5px;letter-spacing:-.005em}

  /* ===== CHAT — masthead + bubbles in brand voice ===== */
  .chathead{font-family:"Archivo",sans-serif}
  .chatpanel{box-shadow:var(--shadow-lg)}
  .msg.bot{background:var(--panel-2);border:1px solid var(--line)}

  /* ===== TOAST + MODAL — warm framed cards ===== */
  .toast{font-family:"Archivo",sans-serif}
  .modalhead{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:17px;letter-spacing:-.008em}
  .vlhead h2{font-family:"Fraunces",Georgia,serif;font-weight:600;letter-spacing:-.008em}

  /* ===== SCENE GALLERY — done badge + progress route read warmly ===== */
  .scard{transition:border-color var(--t),box-shadow var(--t),transform var(--t)}
  .progbar > i{background:linear-gradient(90deg,var(--ok),var(--accent))}

</style>

<script>
const qs = new URLSearchParams(location.search);
let CH = qs.get('channel'), ID = qs.get('id');
let doc = null, activeTab = 'packaging';
const STAGES = [['idea','① Idea'],['packaging','② Packaging'],['script','③ Script'],['scenes','④ Scenes'],['qc','⑤ QC'],['shorts','⑥ Shorts']];

const el = (t,a={},...k)=>{const e=document.createElement(t);for(const[p,v]of Object.entries(a)){
  if(p==='class')e.className=v;else if(p==='html')e.innerHTML=v;else if(p.startsWith('on'))e.addEventListener(p.slice(2),v);else e.setAttribute(p,v);}
  for(const c of k)e.append(c?.nodeType?c:document.createTextNode(c??''));return e;};

/* ---------- UI chrome: inline icons, theme toggle, header meta ---------- */
const ICONS={
  check:'<path d="M20 6 9 17l-5-5"/>',
  sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',
  moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>',
  film:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 4 6 9M13 4l-2 5M18 4l-2 5"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  image:'<rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="m21 15-5-5L5 21"/>',
  mic:'<rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>',
};
function ICO(name,size){const s=size||16;const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('width',s);svg.setAttribute('height',s);
  svg.setAttribute('fill','none');svg.setAttribute('stroke','currentColor');svg.setAttribute('stroke-width','2');
  svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');
  svg.innerHTML=ICONS[name]||'';return svg;}
function setupTheme(){
  const KEY='studio-theme', btn=document.getElementById('themeToggle');
  const apply=t=>{document.documentElement.setAttribute('data-theme',t);
    if(btn){btn.innerHTML='';btn.append(ICO(t==='light'?'moon':'sun',17));btn.title=t==='light'?'Switch to dark theme':'Switch to light theme';}};
  apply(document.documentElement.getAttribute('data-theme')||'dark');
  if(btn)btn.onclick=()=>{const next=(document.documentElement.getAttribute('data-theme')==='light')?'dark':'light';try{localStorage.setItem(KEY,next);}catch(_){}apply(next);};
}
function metaChip(icon,text){const c=el('span',{class:'mchip'});if(icon)c.append(icon);c.append(el('span',{},text));return c;}
function renderMeta(){
  const m=document.getElementById('meta');if(!m)return;m.innerHTML='';
  const sc=((((doc&&doc.stages&&doc.stages.scenes)||{}).candidates)||{}).scenes||[];
  if(!sc.length)return;
  const sec=sc.reduce((a,s)=>a+(+s.audioSeconds||+s.seconds||0),0);
  const imgs=sc.filter(s=>s.imagePath).length, voiced=sc.filter(s=>s.audioPath).length, narr=sc.filter(s=>(s.narration||'').trim()).length;
  m.append(metaChip(ICO('film',13),sc.length+' beats'));
  if(sec){const mm=Math.floor(sec/60)+':'+String(Math.round(sec%60)).padStart(2,'0');m.append(metaChip(ICO('clock',13),mm));}
  m.append(metaChip(ICO('image',13),imgs+'/'+sc.length));
  if(narr)m.append(metaChip(ICO('mic',13),voiced+'/'+narr));
}

async function loadChannels(){

  csel.onchange=async()=>{ CH=csel.value; ID=null; await refreshVideoList(!DASH); if(DASH)enterDashboard(); };

function channelName(){ const c=CHANNELS.find(x=>x.id===CH); return c?c.name:CH; }
async function refreshVideoList(autoOpen=true){

    sh.append(el('span',{class:'chsecname'},c.name),el('span',{class:'est'},mine.length+' video'+(mine.length===1?'':'s')));

function nextAction(v){
  const ORDER=[['idea','Idea'],['packaging','Packaging'],['script','Script'],['scenes','Scenes']];
  const st=v.stages||{};
  for(const[k,name]of ORDER)if(/await/i.test(st[k]||''))return{label:'Needs you — '+name,tab:k,hot:true};
  for(const[k,name]of ORDER)if((st[k]||'locked')==='locked')return{label:'Generate the '+name.toLowerCase(),tab:k,hot:false};
  const me=v.meta||{};
  if(me.beats&&(me.voiced<me.beats||me.imgs<me.beats))return{label:'Finish assets — '+me.imgs+'/'+me.beats+' images · '+me.voiced+'/'+me.beats+' voiced',tab:'scenes',hot:false};
  if(!me.hasCut)return{label:'Assemble the rough cut',tab:'scenes',hot:false};
  return{label:'QC · publish kit · Shorts',tab:'qc',hot:false};
}
function videoCard(v,costs){
  const me=v.meta||{};
  const act=nextAction(v);
  const card=el('div',{class:'vcard'+(act.hot?' hot':''),onclick:()=>openVideo(v.channel,v.id,act.tab)});
  const cover=el('div',{class:'vcover'});
  if(me.thumb){
    const img=el('img',{src:'/api/packaging-asset?channel='+encodeURIComponent(v.channel)+'&id='+encodeURIComponent(v.id)+'&name=final-1.png&t='+encodeURIComponent(v.updatedAt||''),alt:''});
    img.onerror=()=>{img.remove();};
    cover.append(img);
  }
  cover.append(el('span',{class:'vcoverfall'},(v.title||'?').slice(0,1).toUpperCase()));
  if(me.secs)cover.append(el('span',{class:'vlen'},Math.floor(me.secs/60)+':'+String(me.secs%60).padStart(2,'0')));
  card.append(cover);
  const body=el('div',{class:'vbody'});
  body.append(el('div',{class:'vtitle'},v.title||v.id));
  const pips=el('div',{class:'stagepips'});
  [['idea','Idea'],['packaging','Packaging'],['script','Script'],['scenes','Scenes'],['qc','QC'],['shorts','Shorts']].forEach(([k,name])=>{
    const s=(v.stages||{})[k]||'locked';
    const cls=/decid|approv|done/i.test(s)?'done':(/await/i.test(s)?'await':'lock');
    pips.append(el('span',{class:'pip '+cls,title:name+' · '+s}));
  });
  body.append(pips);
  const bits=[];
  if(me.beats)bits.push(me.imgs+'/'+me.beats+' 🖼'+' · '+me.voiced+'/'+me.beats+' 🎙');
  if(me.shorts)bits.push('✂️ '+me.shorts);
  const cost=costs&&costs.perVideo&&costs.perVideo[v.channel+'/'+v.id];
  if(cost&&cost.imagesUsd)bits.push('$'+cost.imagesUsd.toFixed(2));
  if(v.updatedAt)bits.push(new Date(v.updatedAt).toLocaleDateString(undefined,{month:'short',day:'numeric'}));
  body.append(el('div',{class:'vmeta'},bits.join('  ·  ')));
  body.append(el('button',{class:'btn sm'+(act.hot?' accent':''),style:'margin-top:9px',onclick:e=>{e.stopPropagation();openVideo(v.channel,v.id,act.tab);}},(act.hot?'● ':'')+act.label+' →'));
  card.append(body);
  return card;
}

async function startUpload(box,privacy){
  if(!confirm('Upload this video to YouTube as a “'+(privacy||'private')+'” draft?\n\nIt will appear on your channel — you do the final publish in YouTube Studio.'))return;
  box.innerHTML='⬆ Starting upload…';
  try{ const j=await(await fetch('/api/youtube/upload?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({privacy:privacy||'private'})})).json();
    if(j.error){box.textContent='⚠ '+j.error;return;} }
  catch(e){ box.textContent='⚠ '+e; return; }
  pollUpload(box);

function pollUpload(box){
  box.innerHTML=''; const label=el('div',{class:'est'},'Uploading…'); const bar=el('div',{class:'progbar',style:'margin-top:8px'}); const fill=el('i',{style:'width:2%'}); bar.append(fill); box.append(label,bar);
  const t=setInterval(async()=>{
    let j; try{ j=await(await fetch('/api/youtube/upload-status?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID))).json(); }catch(_){return;}
    if(j.state==='starting'||j.state==='uploading'){ label.textContent='⬆ Uploading the video… '+(j.pct||0)+'%'; fill.style.width=Math.max(2,j.pct||0)+'%'; }
    else if(j.state==='thumbnail'){ label.textContent='🖼 Setting the thumbnail…'; fill.style.width='100%'; }
    else if(j.state==='done'){ clearInterval(t); if(doc)doc.youtube={videoId:j.videoId,privacy:j.privacy}; box.innerHTML='';
      box.append(el('div',{html:'✓ Uploaded as <b>'+xesc(j.privacy||'private')+'</b>'+(j.note?' —'+xesc(j.note):'')}),
        el('div',{style:'margin-top:7px'},el('a',{class:'btn sm accent',href:j.studioUrl,target:'_blank'},'Open in YouTube Studio to publish →')));
      showToast('✓ Uploaded to YouTube',4500); }
    else if(j.state==='error'){ clearInterval(t); box.innerHTML=''; box.append(el('div',{},'⚠ Upload failed: '+xesc(j.error||'unknown'))); }
    else if(j.state==='idle'&&!j.running){ /* not started yet */ }
  },2000);
}

async function createSheet(o){
  const chars=Array.from(o.rows.querySelectorAll('[data-row]')).map(r=>{const i=r.querySelectorAll('input');return {name:i[0].value.trim(),desc:i[1].value.trim()};}).filter(c=>c.name);
  if(!o.title.trim()){showToast('Name the sheet first.',2500);return;}
  if(o.mode==='upload'&&!o.dataUrl){showToast('Choose an image to upload.',2500);return;}
  if(o.mode==='generate'&&!chars.length&&!o.desc.trim()){showToast('Add at least one character (or a description).',3000);return;}
  o.btn.disabled=true; const old=o.btn.textContent; o.btn.textContent='⏳ Creating…';
  try{
    const j=await(await fetch('/api/sheets/create?channel='+encodeURIComponent(CH),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:o.title.trim(),mode:o.mode,description:o.desc,dataUrl:o.dataUrl,characters:chars})})).json();
    if(j.ok){
      showToast('✓ Sheet “'+j.title+'” created'+(ID?' — using it for this video':'')+'.',5000);
      if(ID){ try{ await fetch('/api/video/select-sheet?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:j.slug})}); await load(); }catch(_){} }
      mgrSlug=j.slug; closeCast(); openCast();
    } else { showToast('⚠ '+(j.error||j.reply||'failed'),5000); o.btn.disabled=false; o.btn.textContent=old; }
  }catch(e){showToast('⚠ '+e,4500); o.btn.disabled=false; o.btn.textContent=old;}
}

async function loadRoster(grid){

  if(!j.hasSheet)grid.append(el('div',{class:'est',style:'color:#e0a05a'},'⚠ No cast-sheet.png on this sheet yet.'));
  const inVid=new Set((doc&&Array.isArray(doc.cast))?doc.cast:[]);
  (j.roster||[]).forEach(c=>grid.append(castCardEl(c,inVid)));
  if(!(j.roster||[]).length)grid.append(el('div',{class:'est'},'No characters yet — add one below.'));

function castCardEl(c,inVid){
  const row=el('div',{class:'castcardrow'});
  const port=el('div',{class:'castportrait'});
  if(c.hasRef)port.append(el('img',{src:'/api/castref?channel='+encodeURIComponent(CH)+'&slug='+encodeURIComponent(mgrSlug)+'&name='+encodeURIComponent(c.name)+'.png&t='+Date.now(),alt:c.name}));
  else port.append(el('div',{class:'noportrait'},'no ref'));
  row.append(port);
  const meta=el('div',{class:'castmeta'});
  const top=el('div',{class:'row',style:'margin-top:0;gap:6px;align-items:center'});
  top.append(el('b',{},c.name));
  if(c.color&&c.color.skin)top.append(el('span',{class:'swatch',style:'background:'+c.color.skin,title:'skin'}));
  if(c.color&&c.color.hair)top.append(el('span',{class:'swatch',style:'background:'+c.color.hair,title:'hair'}));
  meta.append(top);
  meta.append(el('div',{class:'est'},c.desc||''));
  const acts=el('div',{class:'row',style:'margin-top:7px;gap:6px'});
  if(ID){
    const cb=el('input',{type:'checkbox',...(inVid.has(c.name)?{checked:'checked'}:{})});
    cb.addEventListener('change',()=>toggleInVideo(c.name,cb.checked));
    acts.append(el('label',{class:'invid'},cb,document.createTextNode('in this video')));
  }
  acts.append(el('button',{class:'btn sm',onclick:e=>regenChar(c.name,e.target)},'🔄 Portrait'));
  acts.append(el('button',{class:'btn sm danger',onclick:()=>removeChar(c.name)},'✕ Remove'));
  meta.append(acts);
  row.append(meta);
  return row;
}

  if(!r.ok){document.getElementById('main').innerHTML='<p>Could not load this video.</p>';return;}
  doc=await r.json();
  document.getElementById('ch').textContent=' · '+(doc.workingTitle||ID);
  scriptChecked=false;scenesChecked=false;ideasChecked=false;packagingChecked=false;shortsChecked=false;shortsStat=null;shortsStatAt=0;setChip('saved','✓ saved');renderTabs();render();refreshChat();

function stepState(k){
  const raw=(doc.stages?.[k]?.status)||'locked';
  if(/decid|approv|done|complete/i.test(raw))return 'decided';
  if(/await/i.test(raw))return 'awaiting';
  if(raw==='locked')return 'locked';
  return 'available';
}
function renderTabs(){
  const t=document.getElementById('tabs');t.innerHTML='';
  const curIdx=STAGES.findIndex(([k])=>k===activeTab);
  STAGES.forEach(([k,label],i)=>{
    const state=stepState(k), isActive=k===activeTab, name=label.replace(/^[^A-Za-z]+/,'');
    const go=()=>{activeTab=k;renderTabs();render();};
    const step=el('div',{class:'step'+(isActive?' active':'')+' s-'+state,role:'button',tabindex:'0',title:name+' · '+state,
      onclick:go,onkeydown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();go();}}});
    const node=el('span',{class:'stepnode'});
    if(state==='decided')node.append(ICO('check',14));else node.append(document.createTextNode(String(i+1)));
    if(state==='awaiting'&&!isActive)node.append(el('span',{class:'pulse'}));
    step.append(node,el('span',{class:'steplabel'},name));
    t.append(step);
    if(i<STAGES.length-1)t.append(el('span',{class:'steprail'+((i<curIdx)?' fill':'')}));
  });
}
function render(){
  const m=document.getElementById('main');m.innerHTML='';
  renderMeta();
  const st=doc.stages?.[activeTab];
  if(activeTab==='qc'){m.append(qcPanel(st||{}));return;}   // QC is deterministic — usable as soon as a storyboard exists
  if(activeTab==='shorts'){m.append(shortsPanel(st||{}));return;}   // Shorts Lab — usable once beats are voiced
  if(!st||st.status==='locked'){m.append(lockedPanel());return;}
  if(activeTab==='idea')m.append(ideaPanel(st));
  else if(activeTab==='packaging')m.append(packagingPanel(st));
  else if(activeTab==='script')m.append(scriptPanel(st));
  else if(activeTab==='scenes')m.append(scenesPanel(st));
  else m.append(lockedPanel());
}
function lockedPanel(){
  const labels={script:'Scripting',scenes:'Scenes & image prompts',qc:'Pre-publish QC'};
  return el('div',{class:'panel active'},el('div',{class:'locked',html:
    `<div style="font-size:30px">🔒</div><p><b>${labels[activeTab]||'This stage'}</b> unlocks once we reach it.<br>
     Decide the earlier stages first — I'll generate the candidates for this one when it's time.</p>`}));
}

/* ---------- SCRIPT ---------- */
function scriptPanel(st){
  const p=el('div',{class:'panel active'});
  p.append(el('h2',{class:'stage'},'Script'));
  const cand=st.candidates;
  if(scriptGenerating){
    p.append(el('div',{class:'locked',style:'padding:34px'},el('div',{html:'<div style="font-size:28px">✍️ ⏳</div><b>Researching + writing the script…</b><br>This takes a few minutes — leave this tab open and the draft appears here automatically.'})));
    return p;
  }
  if(!cand||!cand.script){
    p.append(el('p',{class:'sub'},'Research the topic, fact-check it, and draft the full script to the channel standards — hook in the first 5s, retention beats, a payoff that delivers the locked title.'));
    p.append(el('button',{class:'btn accent big',onclick:generateScript},'✍️ Research & write the script'));
    checkScriptRunning();
    return p;
  }
  p.append(el('p',{class:'sub'},(cand.words?cand.words+' words · ':'')+'Review the draft — tweak with a note + regenerate, or accept.'));
  p.append(el('div',{class:'scriptbox'},cand.script));
  p.append(el('button',{class:'btn sm',style:'margin-top:8px',onclick:()=>copyText(cand.script,'script')},'📋 Copy script'));

    const s=el('div',{class:'srcs'});s.append(el('div',{class:'colhead'},'Sources'));
    cand.sources.forEach(x=>s.append(el('div',{},'• '+x)));p.append(s);
  }
  if(cand.thumbnailPrompt){
    p.append(el('div',{class:'colhead',style:'margin-top:18px'},'🖼️ ChatGPT thumbnail prompt'));
    p.append(el('p',{class:'thumbwhy',style:'margin:.2em 0 .5em'},'Paste into ChatGPT with cast-sheet.png attached to generate the real thumbnail art.'));
    p.append(el('div',{class:'scriptbox',style:'max-height:32vh'},cand.thumbnailPrompt));
    p.append(el('button',{class:'btn sm',style:'margin-top:8px',onclick:()=>copyText(cand.thumbnailPrompt,'thumbnail prompt')},'📋 Copy thumbnail prompt'));
  }
  const dec=st.decision=st.decision||{};
  p.append(el('textarea',{class:'bignote',placeholder:'changes to apply on regenerate (e.g. “tighten the intro”, “add the Beringia detail”)…',oninput:e=>{dec.notes=e.target.value;queueSave();}},dec.notes||''));
  p.append(el('div',{class:'nextrow'},
    el('button',{class:'btn',onclick:generateScript},'🔄 Regenerate script'),
    el('button',{class:'btn accent',onclick:async()=>{showToast('Locking script…',1500);await advanceStage('script');activeTab='scenes';await load();}},'Looks good → scenes')));
  return p;
}

/* ---------- IDEA ---------- */
function ideaPanel(st){
  const c=st.candidates||{},d=dec('idea');
  // multi-candidate shape: c.ideas=[{id,statement,demand,angle,spine[],whyItHits,risk}]; fall back to a single legacy idea
  const ideas=(c.ideas&&c.ideas.length)?c.ideas
    :(c.statement?[{id:'i1',statement:c.statement,demand:c.demand,angle:c.angle,spine:c.spine,whyItHits:c.whyItHits,risk:c.risk}]:[]);
  const multi=ideas.length>1;
  const p=el('div',{class:'panel active'});
  p.append(el('h2',{class:'stage'},multi?'Idea — which one earns a video?':'Idea — does it earn a video?'));
  p.append(el('p',{class:'sub'},multi
    ?'Pick the strongest candidate — each one already passed the “would a stranger click this?” gate. Select one to expand it; send the batch back with notes for a fresh set.'
    :'The demand gate. Approve to lock the direction, or send it back with notes.'));
  if(!ideas.length){
    const box=el('div',{class:'imgbar',style:'margin-top:10px'});
    if(ideasGenerating){
      box.append(el('div',{class:'locked',style:'padding:32px'},el('div',{html:'<div style="font-size:28px">💡 ⏳</div><b>Brainstorming ideas in '+xesc(channelName())+'’s lane…</b><br>A minute or two — candidates appear here automatically.'})));
      checkIdeasRunning(); p.append(box); return p;
    }
    box.append(el('b',{},'💡 Brainstorm ideas'));
    box.append(el('div',{class:'est'},'I’ll propose 3–5 demand-screened candidates in '+xesc(channelName())+'’s lane — using its channel.md, style bible, and idea bank. Add a topic to steer, or leave it open for the strongest options.'));
    const inp=el('input',{type:'text',class:'modalinp',style:'margin-top:9px',placeholder:'optional topic / direction…',value:(doc.workingTitle||'')});
    box.append(inp);
    box.append(el('div',{class:'row'},el('button',{class:'btn accent',onclick:()=>startBrainstorm(inp.value)},'💡 Brainstorm ideas')));
    p.append(box); return p;
  }
  if(!d.chosenIdea||!ideas.some(i=>i.id===d.chosenIdea)) d.chosenIdea=ideas[0].id;   // default to the first (my recommendation)
  const list=el('div',{class:'idealist'});
  ideas.forEach(it=>list.append(ideaCard(it,d,multi)));
  p.append(list);
  p.append(gate(multi?'Approve the picked idea?':'Approve this idea?',d,'approved'));
  p.append(gate('Would I click a video on this?',d,'wouldClick'));
  p.append(bignote(d,'notes','Notes / redirections for me (e.g. “go narrower”, “more myth-busting”, “give me a fresh batch”)…'));
  p.append(el('div',{class:'nextrow'},
    el('span',{class:'cap'},d.approved===true?'Idea approved ✓':'Approve the idea (👍) to continue'),
    el('button',{class:'btn',onclick:()=>startBrainstorm((dec('idea').notes)||'')},'🔄 Fresh batch'),
    el('button',{class:'btn accent big',onclick:nextFromIdea},'Lock the idea → write titles →')));
  return p;

  function ideaCard(it,d,multi){
    const chosen=d.chosenIdea===it.id;
    const card=el('div',{class:'ideacard'+(chosen?' chosen':''),onclick:multi?(()=>{if(d.chosenIdea!==it.id){d.chosenIdea=it.id;render();queueSave();}}):null});
    const head=el('div',{class:'ideahead'});
    if(multi)head.append(el('input',{type:'radio',name:'idea',...(chosen?{checked:'checked'}:{}),onclick:e=>e.stopPropagation(),onchange:()=>{d.chosenIdea=it.id;render();queueSave();}}));
    head.append(el('div',{class:'ideastatement'},it.statement||''));
    if(it.demand)head.append(el('span',{class:'demandchip',title:it.demand},(it.demand.split(/[—:–-]/)[0]||'').trim().slice(0,18)));
    card.append(head);
    if(chosen||!multi){
      const body=el('div',{class:'ideabody'});
      if(it.demand){body.append(el('div',{class:'lab'},'Demand check'),el('p',{},it.demand));}
      if(it.angle){body.append(el('div',{class:'lab'},'The angle (original POV)'),el('p',{},it.angle));}
      if(it.spine&&it.spine.length){body.append(el('div',{class:'lab'},'Story spine'));const ul=el('ul',{class:'spine'});it.spine.forEach(s=>ul.append(el('li',{},s)));body.append(ul);}
      if(it.whyItHits){body.append(el('div',{class:'lab'},'Why it hits'),el('p',{},it.whyItHits));}
      if(it.risk){body.append(el('div',{class:'lab'},'The risk'),el('p',{html:'<b>⚠ </b>'+xesc(it.risk)}));}

/* ---------- THUMBNAIL WIREFRAME ENGINE ----------
   A concept is a compact, structured layout spec — NOT hand-drawn SVG. The Studio renders it into a
   clean composition wireframe (real headline type + branded background + a labeled subject placeholder)
   that reads at 120×68 and feeds the Gemini final-art prompt precisely. Old hand-authored `svg` still
   renders via the fallback in thumbCard. */
const CAST_COLORS={
  Max:{skin:'#f2c6a0',hair:'#6e3f1c'}, Luna:{skin:'#f4cda3',hair:'#e7c24c'},
  Zed:{skin:'#b9794a',hair:'#2f2a26'}, Nova:{skin:'#e0b48c',hair:'#9aa0ab'}
};
const BG_PRESETS={
  sky:['#bfe6f7','#7cc1ea'], dawn:['#ffd9a3','#ff9e7a'], sunset:['#ffb24a','#e85b8a'],
  ember:['#3a2233','#7a2e3a'], night:['#1d2740','#33486f'], ocean:['#34435f','#1f5673'],
  snow:['#cdd9e6','#eef5fb'], forest:['#5c7d4f','#27431f'], sand:['#e8d4a8','#cdb27e'],
  stone:['#6b6f78','#3a3e47'], cave:['#2a211a','#0e0b08'], blizzard:['#6e93b2','#dceaf5']
};
function xesc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function wrapText(s,per,max){const w=String(s||'').split(/\s+/).filter(Boolean);const lines=[];let cur='';
  for(const word of w){if((cur+' '+word).trim().length>per&&cur){lines.push(cur);cur=word;}else cur=(cur+' '+word).trim();}
  if(cur)lines.push(cur);return lines.slice(0,max);}
function drawWire(L){
  L=L||{};const W=1280,H=720;const acc=L.accent||'#ec8b4e';
  const cols=BG_PRESETS[L.bg]||(Array.isArray(L.bg)?L.bg:((L.bg&&L.bg.colors)||['#1b1e27','#0f1117']));
  const darkBg=/(night|ocean|ember|cave|stone)/.test(L.bg||'')||false;
  const ink=darkBg?'#0a0d12':'#11161f';                 // text outline
  const sub=L.subject||{}, who=sub.who&&CAST_COLORS[sub.who]?sub.who:'';
  const cc=who?CAST_COLORS[who]:{skin:'#e7d9c4',hair:'#8a8f9c'};
  const zone=sub.zone||'right', hero=(sub.scale||'hero')!=='medium';
  const bw=hero?540:430, bh=hero?604:452;
  const bx=zone==='left'?96:zone==='center'?(W-bw)/2:(W-96-bw);
  const by=(H-bh)/2+ (zone==='center'?40:0);
  const bcx=bx+bw/2;
  // ---- subject placeholder (a clean "casting block": head glyph + name + pose) ----
  let subjSvg='';
  if(sub.who!=='none'){
    const hr=hero?92:74, hcy=by+ (hero?150:128);
    subjSvg=`<g>
      <rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="26" fill="${acc}" fill-opacity="0.10" stroke="${acc}" stroke-opacity="0.6" stroke-width="3" stroke-dasharray="2 14" stroke-linecap="round"/>
      <circle cx="${bcx}" cy="${hcy}" r="${hr}" fill="${cc.skin}" stroke="${ink}" stroke-width="5"/>
      <path d="M ${bcx-hr} ${hcy-6} A ${hr} ${hr} 0 0 1 ${bcx+hr} ${hcy-6} Q ${bcx} ${hcy-hr*0.5} ${bcx-hr} ${hcy-6} Z" fill="${cc.hair}" stroke="${ink}" stroke-width="4"/>
      <text x="${bcx}" y="${hcy+hr+72}" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="${hero?64:54}" fill="${darkBg?'#fff':ink}" stroke="${darkBg?ink:'#fff'}" stroke-width="6" paint-order="stroke">${xesc((who||sub.who||'CAST').toUpperCase())}</text>`;
    const pose=wrapText(sub.pose||'',26,3);
    pose.forEach((ln,i)=>{ subjSvg+=`<text x="${bcx}" y="${hcy+hr+118+i*34}" text-anchor="middle" font-family="ui-sans-serif,Segoe UI,Arial" font-weight="600" font-size="27" fill="${darkBg?'#cdd3df':'#2a2f3a'}" opacity="0.92">${xesc(ln)}</text>`; });
    subjSvg+='</g>';
  }
  // ---- prop chips along the subject block's bottom ----
  let propSvg=''; const props=(L.props||[]).slice(0,3);
  if(props.length){ const chipY=by+bh-44; let cxp=bx+26;
    props.forEach(pr=>{ const t=String(pr).toUpperCase().slice(0,16); const wch=Math.max(80,t.length*15+34);
      propSvg+=`<g><rect x="${cxp}" y="${chipY}" width="${wch}" height="40" rx="20" fill="${ink}" fill-opacity="0.55" stroke="${acc}" stroke-width="2"/><text x="${cxp+wch/2}" y="${chipY+27}" text-anchor="middle" font-family="ui-sans-serif,Arial" font-weight="800" font-size="20" fill="#fff">${xesc(t)}</text></g>`;
      cxp+=wch+12; });
  }
  // ---- headline (real thumbnail typography — the legibility-critical part) ----
  const lines=(L.text||[]).map(t=>typeof t==='string'?{line:t}:t).filter(t=>t&&t.line);
  let textSvg=''; if(lines.length){
    const longest=Math.max(...lines.map(l=>l.line.length));
    const fs=longest<=6?156:longest<=9?128:longest<=12?104:longest<=16?84:70;
    const lh=fs*1.04, blockH=lh*lines.length;
    let tz=L.textZone||(zone==='left'?'right':zone==='center'?'bottom':'left');
    let anchor='start', tx=72, ty;
    if(tz==='right'){anchor='end';tx=W-72;} else if(tz==='center'||tz==='bottom'){anchor='middle';tx=W/2;}
    if(tz==='bottom')ty=H-58-blockH+lh*0.8; else if(tz==='top')ty=70+lh*0.8; else ty=(H-blockH)/2+lh*0.78;
    lines.forEach((l,i)=>{ const fill=l.role==='accent'?acc:(l.role==='dark'?ink:'#ffffff');
      textSvg+=`<text x="${tx}" y="${ty+i*lh}" text-anchor="${anchor}" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="${fs}" fill="${fill}" stroke="${ink}" stroke-width="${Math.round(fs*0.13)}" paint-order="stroke" stroke-linejoin="round">${xesc(l.line.toUpperCase())}</text>`; });
  }
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bgw" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${cols[0]}"/><stop offset="1" stop-color="${cols[1]||cols[0]}"/></linearGradient>
      <radialGradient id="vig" cx="50%" cy="46%" r="72%"><stop offset="62%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.28"/></radialGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#bgw)"/>
    <g opacity="0.06" stroke="${darkBg?'#fff':'#000'}" stroke-width="2" fill="none">${[170,260,350,440,530].map(r=>`<circle cx="120" cy="640" r="${r}"/>`).join('')}</g>
    ${subjSvg}${propSvg}
    <rect width="${W}" height="${H}" fill="url(#vig)"/>
    ${textSvg}
  </svg>`;
}
/* Just the headline text layer (transparent) — overlaid on the generated art so the title is always
   pixel-perfect, since image models garble baked-in words. Same typography/placement as drawWire. */
function drawHeadlineOverlay(L){
  L=L||{};const W=1280,H=720;const acc=L.accent||'#ec8b4e';const ink='#11161f';
  const zone=(L.subject&&L.subject.zone)||'right';
  const lines=(L.text||[]).map(t=>typeof t==='string'?{line:t}:t).filter(t=>t&&t.line);
  if(!lines.length)return '';
  const longest=Math.max(...lines.map(l=>l.line.length));
  const fs=longest<=6?156:longest<=9?128:longest<=12?104:longest<=16?84:70;
  const lh=fs*1.04, blockH=lh*lines.length;
  const tz=L.textZone||(zone==='left'?'right':zone==='center'?'bottom':'left');
  let anchor='start', tx=72, ty;
  if(tz==='right'){anchor='end';tx=W-72;} else if(tz==='center'||tz==='bottom'){anchor='middle';tx=W/2;}
  if(tz==='bottom')ty=H-58-blockH+lh*0.8; else if(tz==='top')ty=70+lh*0.8; else ty=(H-blockH)/2+lh*0.78;
  let textSvg='';
  lines.forEach((l,i)=>{ const fill=l.role==='accent'?acc:(l.role==='dark'?ink:'#ffffff');
    textSvg+=`<text x="${tx}" y="${ty+i*lh}" text-anchor="${anchor}" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="${fs}" fill="${fill}" stroke="${ink}" stroke-width="${Math.round(fs*0.13)}" paint-order="stroke" stroke-linejoin="round">${xesc(l.line.toUpperCase())}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${textSvg}</svg>`;
}

const renderingFrame=new Set();
function sceneByN(n){return ((doc.stages.scenes||{}).candidates||{}).scenes&&doc.stages.scenes.candidates.scenes.find(x=>String(x.n)===String(n));}
function addFrame(n,role){
  const s=sceneByN(n); if(!s)return;
  s.frames=Array.isArray(s.frames)?s.frames:[];
  if(s.frames.length>=8){showToast('Max 8 frames per beat',2500);return;}
  const def=role==='reaction'
    ?'Same character and scene as the previous frame — keep everything identical; change ONLY their expression/pose to: '
    :'Identical to the previous frame — keep everything the same; now ADD/REVEAL: ';
  s.frames.push({role,prompt:def,imagePath:null});
  saveScene(n,{frames:s.frames},true); if(activeTab==='scenes')render();
}
function deleteFrame(n,j){
  const s=sceneByN(n); if(!s||!s.frames)return; s.frames.splice(j,1);
  saveScene(n,{frames:s.frames},true); if(activeTab==='scenes')render();
}
function setFramePrompt(n,j,val){
  const s=sceneByN(n); if(!s||!s.frames||!s.frames[j])return; s.frames[j].prompt=val; saveScene(n,{frames:s.frames});
}
async function genFrame(n,j){
  if(!hasGeminiKey){showToast('Add your Gemini key first (top of the Scenes tab)',3200);return;}
  if(imagesGenerating){showToast('⏳ A full image run is going — wait for it to finish.',3200);return;}
  const k=n+':'+j; if(renderingFrame.has(k))return;
  renderingFrame.add(k); if(activeTab==='scenes')render();
  showToast('🖼️ Rendering frame '+(j+1)+' of scene '+n+'… (~15s)');
  try{ const jr=await (await fetch('/api/generate-frame?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({n,index:j})})).json();
    renderingFrame.delete(k); await load(); showToast((jr.isError?'⚠ ':'✓ ')+(jr.reply||'done'),5000);
  }catch(e){renderingFrame.delete(k);showToast('⚠ '+e,4000);}finally{renderingFrame.delete(k); if(activeTab==='scenes')render();}
}

const SB_AMBIENT=['','ocean','wind','cave','forest','savanna','ice','fire','crowd'];
const SB_CUE=['','act1','rehook','act2','payoff','outro'];
function sbVals(s){
  const kind=s.kind||'illustration';
  return {
    motion:s.motion||(kind==='infographic'?'static':'push-in'),
    textAnim:s.textAnim||((s.onScreenText||'').trim()?'punch':'none'),
    sfx:Array.isArray(s.sfx)?s.sfx:[],
    ambient:s.ambient||'',
    musicCue:s.musicCue||'',
    castAction:s.castAction||'',
  };
}
function storyboardSummary(s){
  const v=sbVals(s);const bits=['🎥 '+v.motion];
  if(v.textAnim!=='none')bits.push('✨ '+v.textAnim);
  if(v.sfx.length)bits.push('🔊 '+v.sfx.join(','));
  if(v.ambient)bits.push('🌊 '+v.ambient);
  if(v.musicCue)bits.push('🎵 '+v.musicCue);
  if(v.castAction)bits.push('🎭 '+(v.castAction.length>34?v.castAction.slice(0,34)+'…':v.castAction));
  return bits.join(' · ');
}
function editSheet(scenes){
  return scenes.map((s,i)=>{
    const v=sbVals(s);const cap=(s.onScreenText||'').trim();
    const L=['#'+(s.n||i+1)+'  ['+(s.segment||'')+']  ~'+(s.audioSeconds||s.seconds||'?')+'s  ('+(s.kind||'illustration')+')'];
    if(s.narration)L.push('🎙 '+s.narration);
    if(cap)L.push('📝 TEXT "'+cap+'"  ['+(s.textPos||'top-center')+', '+v.textAnim+']');
    L.push('🎥 '+v.motion+(v.sfx.length?'   🔊 '+v.sfx.join(','):'')+(v.ambient?'   🌊 '+v.ambient:'')+(v.musicCue?'   🎵 '+v.musicCue:''));
    if(v.castAction)L.push('🎭 '+v.castAction);
    return L.join('\n');
  }).join('\n\n');
}

function sceneCard(s,i){
  const kind=s.kind||'illustration';
  const isInfo=kind==='infographic';
  const capText=s.onScreenText||'';
  let capPos=s.textPos||(capText?'top-center':'none');
  if(!['top-center','center','lower-third','none'].includes(capPos))capPos=capText?'top-center':'none';
  const busy=regenScene.has(s.n);
  const card=el('div',{class:'scard'+(isInfo?' info':'')});
  /* shot — with a LIVE caption overlay so you see where the text lands */
  const shot=el('div',{class:'shot'});
  if(s.imagePath){
    const src=assetSrc(s);
    const a=el('a',{href:src,target:'_blank',title:'Open full size'});
    a.append(el('img',{src,loading:'lazy',alt:'scene '+(s.n||i+1)}));
    shot.append(a,el('span',{class:'badge done'},'✓ rendered'));
  }else{
    shot.append(el('div',{class:'ph'},isInfo?'infographic — not rendered':'no image yet'),el('span',{class:'badge todo'},'○ not rendered'));
  }
  const nFrames=(Array.isArray(s.frames)?s.frames:[]).length;
  if(nFrames)shot.append(el('span',{class:'fbadge'},'🎞 +'+nFrames));
  if(capText&&capPos!=='none')shot.append(el('div',{class:'capov cap-'+capPos},capText));
  if(busy)shot.append(el('div',{class:'spin'},'🖼️ rendering…'));
  /* meta */
  const meta=el('div',{class:'meta'});
  const top=el('div',{class:'top'});
  top.append(el('span',{class:'num'},'Scene '+(s.n||i+1)+(s.seconds?' · ~'+s.seconds+'s':'')));
  if(kind==='map'){
    top.append(el('span',{class:'mapchip',title:'Accurate d3-geo map — the assembler animates the route draw-on live; Gemini never touches it'},'🗺 Accurate map'));
  }else{
    const kindBtn=el('button',{class:'kindchip '+(isInfo?'info':'illus'),title:'Toggle illustration ⇄ infographic (affects how it renders)',
      onclick:()=>{saveScene(s.n,{kind:isInfo?'illustration':'infographic'},true);render();}}, isInfo?'📊 Infographic':'🎨 Illustration');
    top.append(kindBtn);
  }
  (s.characters||[]).forEach(c=>top.append(el('span',{class:'castchip'},c)));
  meta.append(top);
  meta.append(el('div',{class:'narr'}, s.narration?('🎙 '+s.narration):el('span',{class:'empty'},'(no narration on this beat)')));
  /* narration audio (ElevenLabs) — player + per-beat re-voice */
  const hasNarr=!!(s.narration||'').trim();
  if(hasNarr){
    const rev=revoiceScene.has(s.n);
    const aud=el('div',{class:'audiorow'});
    if(s.audioPath)aud.append(el('audio',{class:'player',controls:'controls',preload:'none',src:audioSrc(s)}),el('span',{class:'audsec'},(s.audioSeconds?'~'+s.audioSeconds+'s':'')));
    else aud.append(el('span',{class:'noaud'},'no voice yet'));
    const vbtn=el('button',{class:'btn sm'+(s.audioPath?'':' accent'),onclick:()=>genOneVoice(s.n)},rev?'… voicing':(s.audioPath?'🔁 Re-voice':'🎤 Generate voice'));
    if(!hasVoiceKey){vbtn.disabled=true;vbtn.title='Add your ElevenLabs key above first';}
    if(rev)vbtn.disabled=true;
    aud.append(vbtn);
    meta.append(aud);
  }
  /* on-screen text (overlay) controls */
  const txtRow=el('div',{class:'txtrow'});
  txtRow.append(el('span',{class:'txtlab'},'📝 On-screen'));
  const ti=el('input',{class:'txtin',placeholder:'(no caption on this beat)',value:capText,
    oninput:e=>{const v=e.target.value;const ov=shot.querySelector('.capov');const t=v.trim();
      if(ov){if(t&&capPos!=='none')ov.textContent=t;else ov.remove();}
      else if(t&&capPos!=='none')shot.append(el('div',{class:'capov cap-'+capPos},t));
      saveScene(s.n,{onScreenText:v});}});
  const sel=el('select',{class:'txtpos',title:'Where the caption sits',
    onchange:e=>{saveScene(s.n,{textPos:e.target.value},true);render();}});
  [['top-center','top-center'],['center','center'],['lower-third','lower-third'],['none','none']].forEach(([v,l])=>
    sel.append(el('option',{value:v,...(v===capPos?{selected:'selected'}:{})},l)));
  txtRow.append(ti,sel);
  meta.append(txtRow);
  /* editable image prompt */
  const tog=el('div',{class:'promptToggle'},'▸ edit image prompt');
  const wrap=el('div',{style:'display:none'});
  const ta=el('textarea',{class:'promptEdit',spellcheck:'true',oninput:e=>{saveScene(s.n,{imagePrompt:e.target.value});}},s.imagePrompt||'');
  const pacts=el('div',{class:'acts',style:'margin-top:6px'});
  const reBtn=el('button',{class:'btn sm accent',onclick:()=>saveAndRender(s.n,ta.value)}, hasGeminiKey?'💾 Save & re-render':'💾 Save');
  if(busy){reBtn.disabled=true;reBtn.textContent='… rendering';}
  pacts.append(el('button',{class:'btn sm',onclick:()=>copyText(ta.value,'image prompt')},'📋 Copy'),reBtn);
  wrap.append(ta,el('div',{class:'est',style:'margin-top:4px'},'Edit the prompt, then “Save & re-render” to redo just this shot (~$0.04).'),pacts);
  tog.onclick=()=>{const open=wrap.style.display==='none';wrap.style.display=open?'block':'none';tog.textContent=(open?'▾':'▸')+' edit image prompt';};
  meta.append(tog,wrap);
  /* storyboard (motion / SFX / ambient / music / cast action) */
  const v=sbVals(s);
  const sbTog=el('div',{class:'promptToggle'},'▸ 🎬 storyboard — '+storyboardSummary(s));
  const sbWrap=el('div',{style:'display:none'});
  const grid=el('div',{class:'sbgrid'});
  const fieldSel=(lab,val,opts,onCh)=>{const f=el('div',{class:'sbfield'});const sel=el('select',{onchange:e=>onCh(e.target.value)});
    opts.forEach(o=>sel.append(el('option',{value:o,...(o===val?{selected:'selected'}:{})},o||'(none)')));f.append(el('label',{},lab),sel);return f;};
  const fieldInp=(lab,val,ph,onIn,wide)=>{const f=el('div',{class:'sbfield'+(wide?' wide':'')});const inp=el('input',{value:val,placeholder:ph,oninput:e=>onIn(e.target.value)});f.append(el('label',{},lab),inp);return f;};
  grid.append(
    fieldSel('🎥 Motion',v.motion,['push-in','push-out','pan-left','pan-right','static'],x=>{saveScene(s.n,{motion:x});sbTog.textContent='▾ 🎬 storyboard — '+storyboardSummary({...s,motion:x});}),
    fieldSel('✨ Text in',v.textAnim,['punch','fade','type','none'],x=>saveScene(s.n,{textAnim:x})),
    fieldSel('🌊 Ambient',v.ambient,SB_AMBIENT,x=>saveScene(s.n,{ambient:x})),
    fieldSel('🎵 Music shift',v.musicCue,SB_CUE,x=>saveScene(s.n,{musicCue:x})),
    fieldInp('🔊 SFX (comma-sep)',v.sfx.join(', '),'whoosh, ding',x=>saveScene(s.n,{sfx:x.split(/[,|;]/).map(t=>t.trim().toLowerCase()).filter(Boolean)}),true),
    fieldInp('🎭 Cast action',v.castAction,'Zed crosses arms, then throws hands up',x=>saveScene(s.n,{castAction:x}),true));
  sbWrap.append(grid);
  sbTog.onclick=()=>{const open=sbWrap.style.display==='none';sbWrap.style.display=open?'block':'none';sbTog.textContent=(open?'▾':'▸')+' 🎬 storyboard — '+storyboardSummary(s);};
  meta.append(sbTog,sbWrap);
  /* reveal / reaction frames */
  const frames=Array.isArray(s.frames)?s.frames:[];
  const frLabel=()=>(frames.length?' 🎞 frames ('+frames.length+')':' 🎞 add reveal / reaction frames');
  const frTog=el('div',{class:'promptToggle'},'▸'+frLabel());
  const frWrap=el('div',{style:'display:none'});
  frWrap.append(el('div',{class:'framenote'},'Each frame builds on the one before it (base = the shot above). Reveals add elements one at a time; reactions change a character’s expression/pose. The assembler cuts through them across this beat.'));
  const flist=el('div',{class:'framelist'});
  frames.forEach((f,j)=>flist.append(frameRow(s,f,j)));
  frWrap.append(flist);
  frWrap.append(el('div',{class:'facts',style:'margin-top:8px'},
    el('button',{class:'btn sm',onclick:()=>addFrame(s.n,'reveal')},'+ Reveal frame'),
    el('button',{class:'btn sm',onclick:()=>addFrame(s.n,'reaction')},'+ Reaction frame')));
  frTog.onclick=()=>{const open=frWrap.style.display==='none';frWrap.style.display=open?'block':'none';frTog.textContent=(open?'▾':'▸')+frLabel();};
  meta.append(frTog,frWrap);
  /* row actions */
  const acts=el('div',{class:'acts'});
  if(kind==='map'&&s.map){
    const mapBtn=el('button',{class:'btn sm'+(s.imagePath?'':' accent'),title:'Re-render the accurate d3-geo still from this beat\'s map spec (free, ~20s)',
      onclick:async function(){this.disabled=true;this.textContent='… rendering map';
        try{const j=await(await fetch('/api/render-map?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({n:s.n})})).json();
          showToast((j.isError?'⚠ ':'✓ ')+(j.reply||'done'),5000);await load();
        }catch(e){showToast('⚠ '+e,4000);this.disabled=false;this.textContent='🗺 Re-render map';}}},busy?'… rendering':(s.imagePath?'🗺 Re-render map':'🗺 Render map'));
    acts.append(mapBtn);
  }else{
    const genBtn=el('button',{class:'btn sm'+(s.imagePath?'':' accent'),onclick:()=>genOneImage(s.n)},busy?'… rendering':(s.imagePath?'🔄 Regenerate image':'🖼️ Generate image'));
    if(!hasGeminiKey){genBtn.disabled=true;genBtn.title='Add your Gemini key above first';}
    if(busy)genBtn.disabled=true;
    acts.append(genBtn);
  }
  if(capText)acts.append(el('button',{class:'btn sm',onclick:()=>copyText(capText,'caption')},'📋 Caption'));
  acts.append(el('button',{class:'btn sm',onclick:()=>copyText(s.narration||'','narration')},'📋 Narration'));
  meta.append(acts);
  card.append(shot,meta);
  return card;
}

/* ---------- in-Studio chat (Claude on the Max plan, via the server) ---------- */
const chatPanel=document.getElementById('chatpanel'),chatLog=document.getElementById('chatlog'),
  chatInput=document.getElementById('chatinput'),chatForm=document.getElementById('chatform'),
  chatSend=document.getElementById('chatsend'),chatSub=document.getElementById('chatsub'),
  chatBtn=document.getElementById('chatbtn');
chatBtn.onclick=()=>{chatPanel.classList.add('open');chatBtn.style.display='none';refreshChat();chatInput.focus();};
document.getElementById('chatclose').onclick=()=>{chatPanel.classList.remove('open');chatBtn.style.display='';};
function chatKey(){return 'chat:'+CH+'|'+ID;}
function loadChat(){try{return JSON.parse(localStorage.getItem(chatKey())||'[]');}catch(_){return[];}}
function saveChat(m){try{localStorage.setItem(chatKey(),JSON.stringify(m));}catch(_){}}
function renderChat(msgs){
  chatLog.innerHTML='';
  if(!msgs.length){chatLog.append(el('div',{class:'hint'},'Ask me to add or change a thumbnail, rework a title, brainstorm angles — I’ll edit the Studio for you. Changes appear live.'));return;}
  msgs.forEach(m=>chatLog.append(el('div',{class:'msg '+m.role+(m.err?' err':'')},m.text)));
  chatLog.scrollTop=chatLog.scrollHeight;
}
function refreshChat(){chatSub.textContent=(doc&&doc.workingTitle)||ID||'';renderChat(loadChat());}
chatForm.onsubmit=async(e)=>{
  e.preventDefault();
  const text=chatInput.value.trim();if(!text)return;
  const msgs=loadChat();msgs.push({role:'user',text});saveChat(msgs);renderChat(msgs);
  chatInput.value='';chatInput.disabled=true;chatSend.disabled=true;
  const think=el('div',{class:'msg think'},'Claude is working… (edits can take ~30–60s)');chatLog.append(think);chatLog.scrollTop=chatLog.scrollHeight;
  try{
    const r=await fetch('/api/chat?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
    const j=await r.json();
    const m2=loadChat();m2.push({role:'bot',text:j.reply||j.error||'(no response)',err:!!(j.isError||j.error)});saveChat(m2);
    await load();            /* refresh studio data so any edits show; also re-renders chat */
  }catch(err){
    const m3=loadChat();m3.push({role:'bot',text:'Error talking to Claude: '+err,err:true});saveChat(m3);renderChat(m3);
  }finally{chatInput.disabled=false;chatSend.disabled=false;chatInput.focus();}
};
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chatForm.requestSubmit();}});

/* ---------- per-option regenerate ---------- */
let regenBusy=false, toastTimer=null;
function showToast(msg,ms){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);if(ms)toastTimer=setTimeout(()=>t.classList.remove('show'),ms);}
async function regenerate(kind,targetId,note,label){
  if(regenBusy){showToast('⏳ Already regenerating — one at a time.',2500);return;}
  regenBusy=true;
  showToast('🔄 Regenerating '+(kind==='title'?'title':label)+'… (~30–60s)');
  try{
    const r=await fetch('/api/regenerate?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind,targetId,note})});
    const j=await r.json();
    await load();
    showToast((j.isError?'⚠ ':'✓ ')+(j.reply||j.error||'Done.'),4000);
  }catch(e){showToast('⚠ Error: '+e,4500);}
  finally{regenBusy=false;}
}
async function regenerateAll(){
  if(regenBusy){showToast('⏳ Busy — one at a time.',2500);return;}
  regenBusy=true; showToast('✨ Rebuilding the set from all your hints… (~1–2 min)');
  try{
    const r=await fetch('/api/regenerate-all?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const j=await r.json(); await load(); showToast((j.isError?'⚠ ':'✓ ')+(j.reply||'Done.'),6000);
  }catch(e){showToast('⚠ Error: '+e,4500);}finally{regenBusy=false;}
}
async function advanceStage(from){
  try{const r=await fetch('/api/advance?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from})});return await r.json();}catch(e){return {error:String(e)};}
}
async function nextFromIdea(){
  const d=dec('idea');
  if(!d.chosenIdea){showToast('Pick an idea first ◉',2800);return;}
  if(d.approved!==true){showToast('Approve the idea first — hit “Yes” on the approve gate 👍',3600);return;}
  showToast('🔒 Locking the idea…',1500);
  await advanceStage('idea'); await load(); activeTab='packaging'; renderTabs(); render();
  generatePackaging();
}
let packagingGenerating=false, packagingPollTimer=null, packagingChecked=false;
async function generatePackaging(){
  if(packagingGenerating){showToast('⏳ Titles are already being written — hang tight.',3200);return;}
  packagingGenerating=true; activeTab='packaging'; renderTabs(); render();
  showToast('🏷️ Writing title candidates for the idea… about a minute.');
  startPackagingPoll();
  try{
    const r=await fetch('/api/generate-packaging?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID),{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const j=await r.json(); await load();
    if(j.busy)showToast('Titles were already being written — showing the latest.',4000);
    else showToast((j.isError?'⚠ ':'✓ ')+(j.reply||'Titles ready.'),6000);
  }catch(e){showToast('⚠ Error: '+e,5000);}
  finally{packagingGenerating=false; stopPackagingPoll(); if(activeTab==='packaging')render();}
}
function startPackagingPoll(){
  stopPackagingPoll(); let n=0;
  packagingPollTimer=setInterval(async()=>{
    if(++n>60){stopPackagingPoll();return;}
    try{
      const d2=await(await fetch('/api/video?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID))).json();
      const t=d2.stages&&d2.stages.packaging&&d2.stages.packaging.candidates&&d2.stages.packaging.candidates.titles;
      if(t&&t.length){doc=d2;packagingGenerating=false;stopPackagingPoll();if(activeTab==='packaging')render();showToast('✓ Titles ready — pick your primary.',5500);}
    }catch(_){}
  },5000);
}
function stopPackagingPoll(){if(packagingPollTimer){clearInterval(packagingPollTimer);packagingPollTimer=null;}}
async function checkPackagingRunning(){
  if(packagingChecked||packagingGenerating)return; packagingChecked=true;
  try{
    const j=await(await fetch('/api/status?channel='+encodeURIComponent(CH)+'&id='+encodeURIComponent(ID))).json();
    if(j.packaging){packagingGenerating=true;showToast('🏷️ Titles are already being written…',4000);startPackagingPoll();if(activeTab==='packaging')render();}
  }catch(_){}
}
async function nextFromPackaging(){
